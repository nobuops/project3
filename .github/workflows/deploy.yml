name: Deploy Blog

on:
  push:
    branches: [staging, main]

env:
  AWS_REGION: us-east-1

jobs:
  deploy:
    runs-on: ubuntu-latest
    # main deploys to the "production" GitHub Environment (can require manual
    # approval in Settings > Environments); staging deploys to "staging"
    environment: ${{ github.ref_name == 'main' && 'production' || 'staging' }}

    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v6

      - name: Set environment variables based on branch
        id: envvars
        run: |
          if [ "${{ github.ref_name }}" == "main" ]; then
            echo "bucket_name=my-blog-prod" >> "$GITHUB_OUTPUT"
            echo "state_key=prod/terraform.tfstate" >> "$GITHUB_OUTPUT"
          else
            echo "bucket_name=my-blog-staging" >> "$GITHUB_OUTPUT"
            echo "state_key=staging/terraform.tfstate" >> "$GITHUB_OUTPUT"
          fi

      - name: Trivy secret scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          scanners: secret
          exit-code: 1

      - name: Grype dependency scan
        uses: anchore/scan-action@v7
        with:
          path: "."
          fail-build: true
          severity-cutoff: high

      # NOTE: A Grype step to scan the runner OS would go here.
      # This makes more sense when using a self-hosted runner or a custom
      # image you maintain, since GitHub-hosted runners (ubuntu-latest, etc.)
      # are managed and patched by GitHub — you can't act on findings there.
      # Useful tools for that scenario: Grype (dir:/ scan), Trivy (image/fs scan)

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.10"

      - name: Terraform Init
        run: terraform init -backend-config="key=${{ steps.envvars.outputs.state_key }}"

      - name: Terraform Plan
        run: terraform plan -var="bucket_name=${{ steps.envvars.outputs.bucket_name }}" -out=tfplan.binary

      - name: Convert plan to JSON
        run: terraform show -json tfplan.binary > tfplan.json

      - name: Checkov scan
        uses: bridgecrewio/checkov-action@v12
        with:
          file: tfplan.json
          file_type: terraform_plan
          soft_fail: false
          skip_check: >-
            CKV_AWS_68,CKV_AWS_86,CKV_AWS_374,CKV_AWS_310,CKV_AWS_174,
            CKV2_AWS_62,CKV_AWS_18,CKV2_AWS_32,CKV2_AWS_47,CKV2_AWS_42,
            CKV_AWS_144,CKV_AWS_145

      - name: Terraform Apply
        run: terraform apply -auto-approve tfplan.binary

      - name: Upload website
        run: |
          BUCKET=$(terraform output -raw website_bucket)
          aws s3 sync website/ s3://$BUCKET --delete

      - name: Invalidate CloudFront cache
        run: |
          DIST_ID=$(terraform output -raw cloudfront_distribution_id)
          aws cloudfront create-invalidation --distribution-id $DIST_ID --paths "/*"
